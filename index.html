<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Sukara Restaurante</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold-primary: #C9A962;
            --gold-light: #E8D5A3;
            --gold-dark: #9A7B3D;
            --black: #0A0A0A;
            --black-light: #141414;
            --black-lighter: #1E1E1E;
            --white: #FFFFFF;
            --white-muted: rgba(255, 255, 255, 0.7);
            --white-subtle: rgba(255, 255, 255, 0.1);
            --success: #25D366;
            --danger: #ff6b6b;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
        }
        
        /* Login Screen */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--black) 0%, var(--black-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .login-box {
            background: var(--black-lighter);
            padding: 50px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--white-subtle);
        }
        
        .login-box img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 20px;
        }
        
        .login-box h2 {
            font-family: 'Playfair Display', serif;
            color: var(--gold-primary);
            margin-bottom: 10px;
        }
        
        .login-box p {
            color: var(--white-muted);
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--white-muted);
            font-size: 0.9rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            background: var(--black);
            border: 1px solid var(--white-subtle);
            border-radius: 10px;
            color: var(--white);
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--gold-primary);
        }
        
        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--gold-primary);
            color: var(--black);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            background: var(--gold-light);
        }
        
        .error-message {
            color: var(--danger);
            margin-top: 15px;
            display: none;
        }
        
        /* Admin Panel */
        .admin-panel {
            display: none;
        }
        
        .admin-header {
            background: var(--black-lighter);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--white-subtle);
        }
        
        .admin-logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .admin-logo img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        
        .admin-logo h3 {
            font-family: 'Playfair Display', serif;
            color: var(--gold-primary);
        }
        
        .admin-nav {
            display: flex;
            gap: 10px;
        }
        
        .admin-nav button {
            background: transparent;
            border: 1px solid var(--white-subtle);
            color: var(--white);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .admin-nav button:hover,
        .admin-nav button.active {
            background: var(--gold-primary);
            color: var(--black);
            border-color: var(--gold-primary);
        }
        
        .btn-logout {
            background: var(--danger) !important;
            color: var(--white) !important;
            border-color: var(--danger) !important;
        }
        
        .admin-content {
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: var(--gold-primary);
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--black-lighter);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--white-subtle);
        }
        
        .stat-card i {
            font-size: 2rem;
            color: var(--gold-primary);
            margin-bottom: 15px;
        }
        
        .stat-card h4 {
            color: var(--white-muted);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        .stat-card p {
            font-size: 1.8rem;
            font-weight: 600;
        }
        
        /* Menu Editor */
        .menu-editor {
            background: var(--black-lighter);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid var(--white-subtle);
        }
        
        .category-section {
            margin-bottom: 30px;
        }
        
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--white-subtle);
        }
        
        .category-header h4 {
            color: var(--gold-primary);
            font-size: 1.2rem;
        }
        
        .btn-add {
            background: var(--success);
            color: var(--white);
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        
        .items-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .items-table th,
        .items-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--white-subtle);
        }
        
        .items-table th {
            color: var(--white-muted);
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        
        .items-table input {
            background: var(--black);
            border: 1px solid var(--white-subtle);
            color: var(--white);
            padding: 8px 12px;
            border-radius: 5px;
            width: 100%;
        }
        
        .items-table input:focus {
            outline: none;
            border-color: var(--gold-primary);
        }
        
        .btn-save {
            background: var(--gold-primary);
            color: var(--black);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-delete {
            background: var(--danger);
            color: var(--white);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn-save-all {
            background: var(--gold-primary);
            color: var(--black);
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 20px;
        }
        
        /* Info Editor */
        .info-editor {
            background: var(--black-lighter);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid var(--white-subtle);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .login-box {
                padding: 30px 20px;
                margin: 20px;
            }
            .admin-header {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
            }
            .admin-nav {
                flex-wrap: wrap;
                justify-content: center;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .items-table {
                font-size: 0.85rem;
            }
            .items-table th,
            .items-table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <img src="../assets/images/logo.jpg" alt="Sukara Logo">
            <h2>Painel Administrativo</h2>
            <p>Faça login para gerenciar o site</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Utilizador</label>
                    <input type="text" id="username" placeholder="admin" required>
                </div>
                <div class="form-group">
                    <label for="password">Palavra-passe</label>
                    <input type="password" id="password" placeholder="••••••" required>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
            </form>
            
            <p class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i> Credenciais inválidas
            </p>
        </div>
    </div>
    
    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">
        <header class="admin-header">
            <div class="admin-logo">
                <img src="../assets/images/logo.jpg" alt="Sukara Logo">
                <h3>Painel Administrativo</h3>
            </div>
            <nav class="admin-nav">
                <button class="active" data-tab="menu">
                    <i class="fas fa-utensils"></i> Menu
                </button>
                <button data-tab="info">
                    <i class="fas fa-info-circle"></i> Informações
                </button>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </nav>
        </header>
        
        <main class="admin-content">
            <!-- Menu Tab -->
            <div id="menuTab" class="tab-content">
                <h2 class="section-title">Gerenciar Menu</h2>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-utensils"></i>
                        <h4>Total de Itens</h4>
                        <p id="totalItems">0</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-list"></i>
                        <h4>Categorias</h4>
                        <p id="totalCategories">0</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-fire"></i>
                        <h4>Populares</h4>
                        <p id="popularItems">0</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-dollar-sign"></i>
                        <h4>Preço Médio</h4>
                        <p id="avgPrice">0 Kz</p>
                    </div>
                </div>
                
                <div class="menu-editor">
                    <div id="menuCategories"></div>
                    <button class="btn-save-all" onclick="saveAllChanges()">
                        <i class="fas fa-save"></i> Guardar Todas as Alterações
                    </button>
                </div>
            </div>
            
            <!-- Info Tab -->
            <div id="infoTab" class="tab-content hidden">
                <h2 class="section-title">Informações do Restaurante</h2>
                
                <div class="info-editor">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nome do Restaurante</label>
                            <input type="text" id="restaurantName" value="Sukara">
                        </div>
                        <div class="form-group">
                            <label>Slogan</label>
                            <input type="text" id="restaurantSlogan" value="Taste the Difference">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Morada</label>
                        <input type="text" id="restaurantAddress" value="Avenida 21 de Janeiro, nº 31, Morro Bento, Luanda">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Telefone 1</label>
                            <input type="text" id="restaurantPhone1" value="+244 948 909 000">
                        </div>
                        <div class="form-group">
                            <label>Telefone 2</label>
                            <input type="text" id="restaurantPhone2" value="+244 947 717 172">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Horário de Abertura</label>
                            <input type="text" id="restaurantHours" value="07:30 - 22:00">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="text" id="restaurantEmail" value="info@sukara.com">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Instagram</label>
                            <input type="text" id="restaurantInstagram" value="@sukara">
                        </div>
                        <div class="form-group">
                            <label>Facebook</label>
                            <input type="text" id="restaurantFacebook" value="Sukara Restaurante">
                        </div>
                    </div>
                    
                    <button class="btn-save-all" onclick="saveInfo()">
                        <i class="fas fa-save"></i> Guardar Informações
                    </button>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        // Admin credentials (in production, use proper authentication)
        const ADMIN_USER = 'admin';
        const ADMIN_PASS = 'sukara2024';
        
        // Menu data
        let menuData = JSON.parse(localStorage.getItem('sukaraMenuData')) || {};
        
        // Check if already logged in
        if (localStorage.getItem('sukaraAdminLoggedIn') === 'true') {
            showAdminPanel();
        }
        
        // Login form
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === ADMIN_USER && password === ADMIN_PASS) {
                localStorage.setItem('sukaraAdminLoggedIn', 'true');
                showAdminPanel();
            } else {
                document.getElementById('errorMessage').style.display = 'block';
            }
        });
        
        function showAdminPanel() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadMenuData();
        }
        
        function logout() {
            localStorage.removeItem('sukaraAdminLoggedIn');
            location.reload();
        }
        
        // Tab navigation
        document.querySelectorAll('.admin-nav button[data-tab]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.admin-nav button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const tab = this.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
                document.getElementById(tab + 'Tab').classList.remove('hidden');
            });
        });
        
        // Load menu data from parent site
        function loadMenuData() {
            // Default menu structure if empty
            if (Object.keys(menuData).length === 0) {
                menuData = {
                    pizzas: { name: 'Pizzas', items: [] },
                    hamburgers: { name: 'Hambúrgueres', items: [] },
                    chickenista: { name: 'Frango Chikenista', items: [] },
                    beirut: { name: 'Sabor do Líbano', items: [] },
                    manakish: { name: 'Manakish', items: [] },
                    salads: { name: 'Saladas', items: [] },
                    tostas: { name: 'Tostas', items: [] },
                    omeletes: { name: 'Omeletes', items: [] },
                    miniaturas: { name: 'Miniaturas', items: [] },
                    pratos: { name: 'Pratos', items: [] },
                    bebidas: { name: 'Bebidas Quentes', items: [] },
                    refrigerantes: { name: 'Refrigerantes', items: [] },
                    sumos: { name: 'Sumos Naturais', items: [] }
                };
            }
            
            renderMenuEditor();
            updateStats();
        }
        
        function renderMenuEditor() {
            const container = document.getElementById('menuCategories');
            container.innerHTML = '';
            
            for (const [key, category] of Object.entries(menuData)) {
                const section = document.createElement('div');
                section.className = 'category-section';
                section.innerHTML = `
                    <div class="category-header">
                        <h4>${category.name}</h4>
                        <button class="btn-add" onclick="addItem('${key}')">
                            <i class="fas fa-plus"></i> Adicionar Item
                        </button>
                    </div>
                    <table class="items-table">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Descrição</th>
                                <th>Preço (Kz)</th>
                                <th>Popular</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-${key}">
                        </tbody>
                    </table>
                `;
                container.appendChild(section);
                
                renderCategoryItems(key, category.items);
            }
        }
        
        function renderCategoryItems(categoryKey, items) {
            const tbody = document.getElementById(`tbody-${categoryKey}`);
            if (!tbody) return;
            
            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--white-muted);">Nenhum item nesta categoria</td></tr>';
                return;
            }
            
            tbody.innerHTML = items.map((item, index) => `
                <tr data-index="${index}">
                    <td><input type="text" value="${item.name}" class="item-name" placeholder="Nome do prato"></td>
                    <td><input type="text" value="${item.description}" class="item-desc" placeholder="Descrição"></td>
                    <td><input type="number" value="${item.price}" class="item-price" placeholder="Preço" style="width: 100px;"></td>
                    <td style="text-align: center;">
                        <input type="checkbox" class="item-popular" ${item.popular ? 'checked' : ''}>
                    </td>
                    <td>
                        <button class="btn-save" onclick="saveItem('${categoryKey}', ${index})">
                            <i class="fas fa-save"></i>
                        </button>
                        <button class="btn-delete" onclick="deleteItem('${categoryKey}', ${index})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        function addItem(categoryKey) {
            if (!menuData[categoryKey].items) {
                menuData[categoryKey].items = [];
            }
            
            menuData[categoryKey].items.push({
                id: categoryKey + Date.now(),
                name: 'Novo Item',
                description: 'Descrição do item',
                price: 0,
                image: `../assets/images/menu-${categoryKey}.jpg`,
                popular: false
            });
            
            renderCategoryItems(categoryKey, menuData[categoryKey].items);
            updateStats();
        }
        
        function saveItem(categoryKey, index) {
            const row = document.querySelector(`#tbody-${categoryKey} tr[data-index="${index}"]`);
            
            menuData[categoryKey].items[index] = {
                ...menuData[categoryKey].items[index],
                name: row.querySelector('.item-name').value,
                description: row.querySelector('.item-desc').value,
                price: parseInt(row.querySelector('.item-price').value) || 0,
                popular: row.querySelector('.item-popular').checked
            };
            
            saveToLocalStorage();
            alert('Item guardado com sucesso!');
        }
        
        function deleteItem(categoryKey, index) {
            if (confirm('Tem certeza que deseja remover este item?')) {
                menuData[categoryKey].items.splice(index, 1);
                renderCategoryItems(categoryKey, menuData[categoryKey].items);
                updateStats();
                saveToLocalStorage();
            }
        }
        
        function saveAllChanges() {
            // Save all visible items
            for (const [key, category] of Object.entries(menuData)) {
                const rows = document.querySelectorAll(`#tbody-${key} tr[data-index]`);
                rows.forEach((row, index) => {
                    if (category.items[index]) {
                        category.items[index] = {
                            ...category.items[index],
                            name: row.querySelector('.item-name').value,
                            description: row.querySelector('.item-desc').value,
                            price: parseInt(row.querySelector('.item-price').value) || 0,
                            popular: row.querySelector('.item-popular').checked
                        };
                    }
                });
            }
            
            saveToLocalStorage();
            alert('Todas as alterações foram guardadas!');
        }
        
        function saveToLocalStorage() {
            localStorage.setItem('sukaraMenuData', JSON.stringify(menuData));
        }
        
        function updateStats() {
            let totalItems = 0;
            let totalCategories = 0;
            let popularItems = 0;
            let totalPrice = 0;
            let priceCount = 0;
            
            for (const category of Object.values(menuData)) {
                if (category.items && category.items.length > 0) {
                    totalCategories++;
                    totalItems += category.items.length;
                    
                    category.items.forEach(item => {
                        if (item.popular) popularItems++;
                        totalPrice += item.price;
                        priceCount++;
                    });
                }
            }
            
            document.getElementById('totalItems').textContent = totalItems;
            document.getElementById('totalCategories').textContent = totalCategories;
            document.getElementById('popularItems').textContent = popularItems;
            document.getElementById('avgPrice').textContent = priceCount > 0 ? 
                Math.round(totalPrice / priceCount).toLocaleString() + ' Kz' : '0 Kz';
        }
        
        function saveInfo() {
            const info = {
                name: document.getElementById('restaurantName').value,
                slogan: document.getElementById('restaurantSlogan').value,
                address: document.getElementById('restaurantAddress').value,
                phone1: document.getElementById('restaurantPhone1').value,
                phone2: document.getElementById('restaurantPhone2').value,
                hours: document.getElementById('restaurantHours').value,
                email: document.getElementById('restaurantEmail').value,
                instagram: document.getElementById('restaurantInstagram').value,
                facebook: document.getElementById('restaurantFacebook').value
            };
            
            localStorage.setItem('sukaraRestaurantInfo', JSON.stringify(info));
            alert('Informações guardadas com sucesso!');
        }
    </script>
</body>
</html>
